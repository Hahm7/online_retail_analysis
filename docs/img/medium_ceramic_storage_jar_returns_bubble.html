<div id="wrap" style="padding:1rem 0;font-family:ui-sans-serif,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <h3 id="ttl" style="font-size:18px;font-weight:500;margin:0 0 4px">Only the medium ceramic storage jar is returned in bulk <em>and</em> repeatedly</h3>
  <p id="sub" style="font-size:13px;margin:0 0 16px">Position = units returned &middot; Bubble size = orders placed</p>
  <div style="position:relative;width:100%;height:420px">
    <canvas id="b3" role="img" aria-label="Bubble chart of units returned per product sized by order count, medium ceramic storage jar highlighted">Medium ceramic storage jar has both high returns and many orders.</canvas>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){
var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme:dark)').matches;
var C = {
  title: dark ? '#f5f4ef' : '#1a1a19',
  sub:   dark ? '#a8a69d' : '#6b6a65',
  ink:   dark ? '#c3c2b7' : '#52514e',
  muted: '#898781',
  grid:  dark ? '#2c2c2a' : '#e6e4dc',
  surf:  dark ? '#1a1a19' : '#fcfcfb',
  accent:'#d94a3d',
  grey:  dark ? '#575652' : '#c9c7bd'
};
document.getElementById('ttl').style.color = C.title;
document.getElementById('sub').style.color = C.sub;

var rows = [
 {n:'Paper craft, little birdie', r:80995, o:1},
 {n:'Medium ceramic storage jar', r:74494, o:247, hero:true},
 {n:'Rotating silver angels', r:9381, o:756},
 {n:'Fruit salad paper cups', r:7140, o:136},
 {n:'Fruit salad paper plates', r:7008, o:143},
 {n:'Pop art pen case & pens', r:5184, o:31},
 {n:'Black silver flower t-light', r:5040, o:23},
 {n:'Multicolour spring flower mug', r:4996, o:204},
 {n:'Teatime pen case & pens', r:4632, o:59},
 {n:'White bird garden mug', r:4320, o:35}
];
var pts = rows.map(function(d,i){
  return {x:d.r, y:rows.length-1-i, r:Math.max(4, Math.sqrt(d.o)/1.45), o:d.o, n:d.n, hero:!!d.hero};
});

var orderLabels = {
  id:'ol',
  afterDatasetsDraw: function(c){
    var ctx = c.ctx, m = c.getDatasetMeta(0);
    ctx.save();
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    m.data.forEach(function(p,i){
      var d = pts[i];
      ctx.font = (d.hero ? '600' : '400') + " 11px ui-sans-serif,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif";
      ctx.fillStyle = d.hero ? C.accent : C.muted;
      ctx.fillText(d.o.toLocaleString() + (d.o === 1 ? ' order' : ' orders'), p.x + d.r + 7, p.y);
    });
    ctx.restore();
  }
};

new Chart(document.getElementById('b3'), {
  type:'bubble',
  data:{datasets:[{
    data: pts,
    backgroundColor: pts.map(function(p){ return p.hero ? C.accent : C.grey; }),
    borderColor: C.surf,
    borderWidth: 1.5
  }]},
  plugins:[orderLabels],
  options:{
    responsive:true,
    maintainAspectRatio:false,
    layout:{padding:{right:30, top:8, bottom:4}},
    plugins:{
      legend:{display:false},
      tooltip:{callbacks:{label:function(c){
        return c.raw.n + ': ' + c.raw.x.toLocaleString() + ' returned, ' + c.raw.o + ' orders';
      }}}
    },
    scales:{
      x:{min:-3000, max:95000, grid:{color:C.grid, drawTicks:false},
         title:{display:true, text:'Units returned', color:C.ink, font:{size:12}},
         ticks:{color:C.muted, font:{size:11}, callback:function(v){ return v<0 ? '' : v/1000 + 'k'; }}},
      y:{min:-0.6, max:9.6, grid:{display:false},
         ticks:{color:C.ink, font:{size:11.5}, stepSize:1,
           callback:function(v){ return rows[rows.length-1-v] ? rows[rows.length-1-v].n : ''; }}}
    }
  }
});
})();
</script>
