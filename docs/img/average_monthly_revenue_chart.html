<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Average monthly revenue — UCI Online Retail II</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    padding: 64px 72px 72px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .title {
    font-size: 32px;
    font-weight: 600;
    line-height: 1.35;
    color: #111111;
    margin-bottom: 12px;
    max-width: 980px;
  }
  .subtitle {
    font-size: 18px;
    color: #6b6b6b;
    margin-bottom: 40px;
  }
  .chart-wrap {
    position: relative;
    width: 100%;
    height: 560px;
  }
  .axis-label {
    font-size: 16px;
    color: #8a8a8a;
    margin-top: 18px;
  }
  .source {
    font-size: 15px;
    color: #aaaaaa;
    margin-top: 34px;
  }
</style>
</head>
<body>

<p class="title"><span style="color:#2471C8;">November</span> generates the highest average revenue</p>
<p class="subtitle">Average monthly revenue (£)</p>

<div class="chart-wrap">
  <canvas id="chart" role="img" aria-label="Bar chart of average monthly revenue. November peaks at £2.82M, all other months shown in grey."></canvas>
</div>

<p class="source">Source: UCI Machine Learning Repository — Online Retail II dataset</p>

<script>
const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const revs   = [1183834.72,1024882.27,1431482.22,1118602.40,1337480.85,1395015.61,1292792.10,1363176.88,1852955.48,2130807.95,2821777.40,1977248.93];
const NOV    = 10;

const labelPlugin = {
  id: 'novLabel',
  afterDraw(chart) {
    const { ctx, scales: { x, y } } = chart;
    const novX = x.getPixelForValue(NOV);
    const novY = y.getPixelForValue(revs[NOV]);
    ctx.save();
    ctx.fillStyle = '#2471C8';
    ctx.font = '600 18px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('£2.82M', novX, novY - 14);
    ctx.restore();
  }
};

new Chart(document.getElementById('chart'), {
  type: 'bar',
  plugins: [labelPlugin],
  data: {
    labels: months,
    datasets: [{
      data: revs,
      backgroundColor: revs.map((_, i) => i === NOV ? '#2471C8' : '#D3D1C7'),
      borderRadius: 3,
      borderSkipped: false,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    layout: { padding: { top: 32, right: 16 } },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ' £' + (ctx.parsed.y / 1e6).toFixed(2) + 'M'
        }
      }
    },
    scales: {
      x: {
        ticks: {
          autoSkip: false,
          color: (ctx) => ctx.index === NOV ? '#2471C8' : '#6b6b6b',
          font: {
            size: 16,
            family: 'Inter, system-ui, sans-serif',
            weight: (ctx) => ctx.index === NOV ? '600' : '400'
          }
        },
        grid: { display: false },
        border: { display: false }
      },
      y: {
        min: 0,
        max: 3000000,
        ticks: {
          stepSize: 500000,
          color: '#8a8a8a',
          font: { size: 15, family: 'Inter, system-ui, sans-serif' },
          callback: v => v === 0 ? '£0' : '£' + (v / 1e6).toFixed(1) + 'M'
        },
        grid: { color: 'rgba(0,0,0,0.05)' },
        border: { display: false }
      }
    }
  }
});
</script>
</body>
</html>
