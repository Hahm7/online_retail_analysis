
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
.wrap{font-family:'Inter',sans-serif;padding:1.5rem 2rem;background:#fff;color:#18160F}
.title{font-size:17px;font-weight:500;color:#18160F;margin:0 0 4px;line-height:1.4}
.sub{font-size:12px;color:#6A6158;margin:0 0 20px}
.axis{font-size:11px;color:#6A6158;margin:8px 0 0}
.source{font-size:11px;color:#ABA49B;margin:16px 0 0}
</style>

<div class="wrap">
  <p class="title">Revenue peaks at <span style="color:#534AB7;">12pm</span> and falls to near zero by 8pm</p>
  <p class="sub">Total revenue by hour of day (&pound;) &mdash; UCI Online Retail II dataset</p>
  <div style="position:relative;width:100%;height:320px;">
    <canvas id="hourChart"></canvas>
  </div>
  <p class="axis">Total revenue (&pound;)</p>
  <p class="source">Source: UCI Machine Learning Repository &mdash; Online Retail II dataset</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const hours = ['6am','7am','8am','9am','10am','11am','12pm','1pm','2pm','3pm','4pm','5pm','6pm','7pm','8pm'];
const revenue = [4.25,35887.60,375590.03,1165686.89,1737483.93,1731064.50,2163107.26,2005914.35,1842055.00,1689547.14,1003737.88,580720.69,186211.07,95788.02,13129.89];
const maxIdx = revenue.indexOf(Math.max(...revenue));
const fontFamily = "'Inter', sans-serif";
const tickColor = '#888780';
const gridColor = 'rgba(136,135,128,0.12)';

const pointRadius = revenue.map((_,i) => i === maxIdx ? 5 : 0);
const pointHoverRadius = revenue.map((_,i) => 4);
const pointColors = revenue.map((_,i) => i === maxIdx ? '#534AB7' : 'transparent');

const datalabelPlugin = {
  id: 'datalabel',
  afterDatasetsDraw(chart) {
    const {ctx} = chart;
    const meta = chart.getDatasetMeta(0);
    meta.data.forEach((point, i) => {
      if (i !== maxIdx) return;
      const label = '\u00A3' + (revenue[i]/1000000).toFixed(1) + 'M';
      ctx.save();
      ctx.font = `500 12px ${fontFamily}`;
      ctx.fillStyle = '#534AB7';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(label, point.x, point.y - 8);
      ctx.restore();
    });
  }
};

new Chart(document.getElementById('hourChart'), {
  type: 'line',
  data: {
    labels: hours,
    datasets: [{
      data: revenue,
      borderColor: '#534AB7',
      borderWidth: 2.5,
      backgroundColor: 'rgba(83,74,183,0.08)',
      fill: true,
      tension: 0.4,
      pointBackgroundColor: pointColors,
      pointBorderColor: pointColors,
      pointRadius: pointRadius,
      pointHoverRadius: pointHoverRadius,
      pointHoverBackgroundColor: '#534AB7'
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ` \u00A3${ctx.parsed.y.toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2})}`
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { font: { size: 11, family: fontFamily }, color: tickColor }
      },
      y: {
        grid: { color: gridColor },
        border: { display: false },
        ticks: {
          font: { size: 11, family: fontFamily },
          color: tickColor,
          callback: v => v >= 1000000 ? '\u00A3' + (v/1000000).toFixed(1) + 'M' : v >= 1000 ? '\u00A3' + (v/1000).toFixed(0) + 'K' : '\u00A3' + v
        }
      }
    }
  },
  plugins: [datalabelPlugin]
});
</script>
