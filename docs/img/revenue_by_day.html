
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
.wrap{font-family:'Inter',sans-serif;padding:1.5rem 2rem;background:#fff;color:#18160F}
.title{font-size:17px;font-weight:500;color:#18160F;margin:0 0 4px;line-height:1.4}
.sub{font-size:12px;color:#6A6158;margin:0 0 20px}
.axis{font-size:11px;color:#6A6158;margin:8px 0 0}
.source{font-size:11px;color:#ABA49B;margin:16px 0 0}
</style>

<div class="wrap">
  <p class="title"><span style="color:#C0392B;">Saturday</span> generates less than 1% of weekly revenue &mdash; almost all trading occurs Monday to Friday</p>
  <p class="sub">Total revenue by day of week (&pound;) &mdash; UCI Online Retail II dataset</p>
  <div style="position:relative;width:100%;height:320px;">
    <canvas id="dayChart"></canvas>
  </div>
  <p class="source">Source: UCI Machine Learning Repository &mdash; Online Retail II dataset</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
const revenue = [2442121.66, 2792959.77, 2640114.06, 2932791.40, 2224257.61, 9488.27, 1584195.74];
const minIdx = revenue.indexOf(Math.min(...revenue));
const fontFamily = "'Inter', sans-serif";
const tickColor = '#888780';
const gridColor = 'rgba(136,135,128,0.12)';
const barColors = revenue.map((_,i) => i === minIdx ? '#C0392B' : '#C8C5BB');

const datalabelPlugin = {
  id: 'datalabel',
  afterDatasetsDraw(chart) {
    const {ctx} = chart;
    const meta = chart.getDatasetMeta(0);
    meta.data.forEach((bar, i) => {
      if (i !== minIdx) return;
      const label = '\u00A3' + revenue[i].toLocaleString('en-GB', {minimumFractionDigits:0, maximumFractionDigits:0});
      ctx.save();
      ctx.font = `500 12px ${fontFamily}`;
      ctx.fillStyle = '#C0392B';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(label, bar.x, bar.y - 4);
      ctx.restore();
    });
  }
};

new Chart(document.getElementById('dayChart'), {
  type: 'bar',
  data: {
    labels: days,
    datasets: [{
      data: revenue,
      backgroundColor: barColors,
      borderRadius: 3,
      borderSkipped: false
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ` \u00A3${ctx.parsed.y.toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2})}`
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { font: { size: 11, family: fontFamily }, color: tickColor }
      },
      y: {
        grid: { color: gridColor },
        border: { display: false },
        ticks: {
          font: { size: 11, family: fontFamily },
          color: tickColor,
          callback: v => v >= 1000000 ? '\u00A3' + (v/1000000).toFixed(1) + 'M' : v >= 1000 ? '\u00A3' + (v/1000).toFixed(0) + 'K' : '\u00A3' + v
        }
      }
    }
  },
  plugins: [datalabelPlugin]
});
</script>
